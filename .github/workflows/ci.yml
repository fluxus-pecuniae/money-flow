name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

# All jobs install reproducibly from requirements-dev.lock + the local package
# without re-resolving its deps. Regenerate the lock after any pyproject.toml
# dependency change:
#     pip-compile --extra dev --output-file requirements-dev.lock pyproject.toml

jobs:
  # ---------------------------------------------------------------------------
  # BLOCKING: all checks here must pass before a merge is allowed.
  # ---------------------------------------------------------------------------
  blocking:
    name: Blocking checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies (locked)
        run: |
          pip install -r requirements-dev.lock
          pip install -e . --no-deps

      # JS syntax check (no Node version needed — uses system node)
      - name: JS syntax check
        run: node --check apps/dashboard/evidence-dashboard.js

      # Python compile check (catches syntax errors in all modules)
      - name: Python compile check
        run: python -m compileall -q core services apps tests scripts

      # Canonical truth registry must be up-to-date
      - name: Registry export --check
        run: python scripts/export_current_truth.py --check

      # Trading safety invariants (cannot be weakened) + fast guard tests
      - name: Trading safety invariants
        run: >
          python -m pytest -q
          tests/test_trading_safety_invariants.py
          tests/test_current_truth_consistency.py
          tests/test_current_truth_registry.py
          tests/test_pt_rt1_6_week2_slate.py
          tests/test_dashboard_static_assets.py
          tests/test_operational_docs.py
          tests/test_obs_os1_daily_review.py

      # Text guards (no positive live/production approval language in source)
      - name: Trading safety text guards
        run: |
          python scripts/check_trading_safety_text.py
          python -m pytest -q tests/test_trading_safety_text_guards.py

      # Secret hygiene (no obvious key material committed)
      - name: Secret hygiene
        run: |
          python scripts/check_secret_hygiene.py
          python -m pytest -q tests/test_secret_hygiene.py

      # Review bundle hygiene (.archiveignore contract)
      - name: Review bundle hygiene
        run: python -m pytest -q tests/test_review_bundle_hygiene.py

      # EXEC-EV1 depth-aware execution-quality friction model (deterministic, offline)
      - name: EXEC-EV1 execution-quality model
        run: python -m pytest -q tests/test_exec_ev1_execution_quality.py

      # SEL-EV1 cross-sectional selection evidence layer: routing seam,
      # per-symbol byte-identical regression, no-lookahead, random-benchmark
      # reproducibility, rotation/diversity flag (deterministic, offline)
      - name: SEL-EV1 selection evidence model
        run: python -m pytest -q tests/test_sel_ev1_selection_evidence.py

      # Lint (ruff) — scoped to CI-SAFE1 authored modules; pre-existing debt tracked in KNOWN_ISSUES
      - name: Lint (ruff — safety modules)
        run: |
          ruff check \
            scripts/check_trading_safety_text.py \
            scripts/check_secret_hygiene.py \
            tests/test_trading_safety_invariants.py \
            tests/test_trading_safety_text_guards.py \
            tests/test_secret_hygiene.py \
            tests/test_review_bundle_hygiene.py \
            tests/test_current_truth_consistency.py \
            tests/test_current_truth_registry.py
          ruff format --check \
            scripts/check_trading_safety_text.py \
            scripts/check_secret_hygiene.py \
            tests/test_trading_safety_invariants.py \
            tests/test_trading_safety_text_guards.py \
            tests/test_secret_hygiene.py \
            tests/test_review_bundle_hygiene.py \
            tests/test_current_truth_consistency.py \
            tests/test_current_truth_registry.py

  # ---------------------------------------------------------------------------
  # DASHBOARD-QA: Playwright browser-smoke suite for the Paper Trading dashboard.
  # Promoted to BLOCKING in CI-CLEAN1 after consistent Ubuntu greens on DASH-QA1.1.
  # Kept as a separate job because it needs `playwright install chromium`; the
  # browser pytest marker must NOT be folded into the main full-tests run.
  # ---------------------------------------------------------------------------
  dashboard-qa:
    name: Dashboard browser smoke (DASH-QA1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies (locked)
        run: |
          pip install -r requirements-dev.lock
          pip install -e . --no-deps

      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      - name: Run dashboard browser-smoke suite
        run: python -m pytest -m browser tests/dashboard_qa/ -q

  # ---------------------------------------------------------------------------
  # INFORMATIONAL — TYPECHECK: mypy strict, non-blocking. Address incrementally
  # toward green; promote to blocking only when the strict-mypy debt is clean.
  # Split from the full-tests job in CI-CLEAN1 so a mypy failure cannot hide the
  # full pytest suite's signal.
  # ---------------------------------------------------------------------------
  typecheck:
    name: Type check (mypy strict, informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies (locked)
        run: |
          pip install -r requirements-dev.lock
          pip install -e . --no-deps

      - name: Type check (mypy)
        run: mypy .

  # ---------------------------------------------------------------------------
  # INFORMATIONAL — FULL TESTS: the full pytest suite, non-blocking. Excludes
  # the `browser` marker (owned by dashboard-qa). Some test categories require
  # optional deps or infra; failures here are visible but do not block.
  # ---------------------------------------------------------------------------
  full-tests:
    name: Full pytest suite (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies (locked)
        run: |
          pip install -r requirements-dev.lock
          pip install -e . --no-deps

      - name: Full pytest suite (excludes browser marker)
        run: python -m pytest -q -m "not browser"
