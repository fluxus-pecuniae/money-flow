name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

# All jobs install reproducibly from requirements-dev.lock + the local package
# without re-resolving its deps. Regenerate the lock after any pyproject.toml
# dependency change:
#     pip-compile --extra dev --output-file requirements-dev.lock pyproject.toml

jobs:
  # ---------------------------------------------------------------------------
  # BLOCKING: all checks here must pass before a merge is allowed.
  # ---------------------------------------------------------------------------
  blocking:
    name: Blocking checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies (locked)
        run: |
          pip install -r requirements-dev.lock
          pip install -e . --no-deps

      # JS syntax check (no Node version needed — uses system node)
      - name: JS syntax check
        run: node --check apps/dashboard/evidence-dashboard.js

      # Python compile check (catches syntax errors in all modules)
      - name: Python compile check
        run: python -m compileall -q core services apps tests scripts

      # Canonical truth registry must be up-to-date
      - name: Registry export --check
        run: python scripts/export_current_truth.py --check

      # Trading safety invariants (cannot be weakened) + fast guard tests
      - name: Trading safety invariants
        run: >
          python -m pytest -q
          tests/test_trading_safety_invariants.py
          tests/test_current_truth_consistency.py
          tests/test_current_truth_registry.py
          tests/test_pt_rt2_mf_signal_slate.py
          tests/test_dashboard_static_assets.py
          tests/test_operational_docs.py
          tests/test_obs_os1_daily_review.py

      # Text guards (no positive live/production approval language in source)
      - name: Trading safety text guards
        run: |
          python scripts/check_trading_safety_text.py
          python -m pytest -q tests/test_trading_safety_text_guards.py

      # Secret hygiene (no obvious key material committed)
      - name: Secret hygiene
        run: |
          python scripts/check_secret_hygiene.py
          python -m pytest -q tests/test_secret_hygiene.py

      # Review bundle hygiene (.archiveignore contract)
      - name: Review bundle hygiene
        run: python -m pytest -q tests/test_review_bundle_hygiene.py

      # EXEC-EV1 depth-aware execution-quality friction model (deterministic, offline)
      - name: EXEC-EV1 execution-quality model
        run: python -m pytest -q tests/test_exec_ev1_execution_quality.py

      # SEL-EV1 cross-sectional selection evidence layer: routing seam,
      # per-symbol byte-identical regression, no-lookahead, random-benchmark
      # reproducibility, rotation/diversity flag (deterministic, offline)
      - name: SEL-EV1 selection evidence model
        run: python -m pytest -q tests/test_sel_ev1_selection_evidence.py

      # RLOG1 research log: aggregator reproducibility (--check drift guard),
      # authored-not-inferred outcome taxonomy, joined analytics (offline)
      - name: RLOG1 research log
        run: |
          python scripts/build_research_log.py --check
          python -m pytest -q tests/test_rlog1_research_log.py

      # TSMOM-EV1 vol-targeted time-series momentum: routing seam, vol-parity
      # sizing, no-lookahead, friction, buy-hold risk-adjusted gate +
      # honesty qualifiers, committed-summary reconciliation (offline)
      - name: TSMOM-EV1 momentum evidence model
        run: python -m pytest -q tests/test_tsmom_ev1_evidence.py

      # FUND-EV1 delta-neutral funding carry: routing seam, exact funding
      # accrual + sign, two-leg neutrality, costs on both legs, no-lookahead,
      # real one-leg-exposure tail stress, gate semantics, committed-summary
      # + funding-snapshot reconciliation (offline)
      - name: FUND-EV1 funding carry evidence model
        run: python -m pytest -q tests/test_fund_ev1_evidence.py

      # FUND-EV2 realistic-cost carry re-test: cited per-venue cost model
      # applied, sweep monotonicity, selectivity gating + hysteresis,
      # cross-venue legging exposure, no-lookahead, K-019, gate v2 verdicts
      # + breakpoint + fragility, committed-summary/calibration checks,
      # research-log honesty pin (offline)
      - name: FUND-EV2 realistic-cost carry evidence model
        run: python -m pytest -q tests/test_fund_ev2_evidence.py

      # FUND-SCALE1 size/fee-tier viability: cited tier tables monotone,
      # fee-down/impact-up with size, fixed-cost amortization, own-volume
      # tier achievement, computed (not hard-coded) viability band,
      # no-lookahead at size, K-019, retail-cell reproduction,
      # research-log honesty pin (offline)
      - name: FUND-SCALE1 scale viability evidence model
        run: python -m pytest -q tests/test_fund_scale1_evidence.py

      # TREND-OVERLAY1 deployable drawdown-control overlay (signal only):
      # defaults pinned to the TSMOM-EV1 train-chosen config (no silent
      # re-tune), trend states, risk-equal vol targeting + caps,
      # closed-candle no-lookahead, disclaimer on every surface, offline
      # CLI path (offline)
      - name: TREND-OVERLAY1 drawdown overlay signal tool
        run: python -m pytest -q tests/test_trend_overlay1.py

      # TREND-SUITE1 canonical trend suite: routing seam (shared buy-hold
      # gate), Donchian/MA-cross/MTF/ensemble signal correctness, per-family
      # no-lookahead, fractional-strength sizing with the integer path
      # unchanged (TSMOM cannot drift), friction, vol-targeted vs
      # equal-dollar comparison, EV1 carry-over digit-exact reproduction,
      # K-019, research-log honesty pin (offline)
      - name: TREND-SUITE1 canonical trend suite evidence model
        run: python -m pytest -q tests/test_trend_suite1_evidence.py

      # MONEYFLOW-SIGNAL1 source-faithful Money Flow signal surface: fidelity
      # fixtures reproduce hand-computed indicator arithmetic and the
      # page-cited rules (p.37 crossover, p.150 exits, p.127/140 RSI, p.146
      # Stage-2 entry), MF-ORIG primitive reuse (no lookalike), closed-candle
      # no-lookahead + warm-up never guessed, regime overlay through the
      # strategy_types seam with the honest-FAIL verdict intact, disclaimer
      # on every surface, committed defensive-mechanic (not-validated-alpha)
      # characterization pin, offline CLI path (offline)
      - name: MONEYFLOW-SIGNAL1 source-faithful signal surface
        run: python -m pytest -q tests/test_moneyflow_signal1.py

      # REGIME2 objective-aligned regime filter: pre-registered selection on
      # train drawdown (never Sharpe, never OOS), whipsaw tie-break, REGIME1
      # bars held unchanged + return-retention tolerance, deployed default
      # pinned to the REGIME2 selection with the honest process-stability
      # fail on every surface, committed-summary pre-registration pin
      # (offline)
      - name: REGIME2 objective-aligned regime filter
        run: python -m pytest -q tests/test_regime2_filter.py

      # REGIME1 market-regime risk-off filter (risk tool, not alpha): exact
      # breadth/threshold/BTC-rule state, warm-up never guessed, no-lookahead
      # probes, synthetic-crash drawdown reduction through the real simulator,
      # whipsaw cost surfaced, importable gate + strategy_types seam, gate
      # semantics with the always-on not-alpha qualifier, pinned default
      # config, disclaimer on every surface, committed honest-fail summary
      # (offline)
      - name: REGIME1 market-regime risk-off filter
        run: python -m pytest -q tests/test_regime1_filter.py

      # FUND-VENUES1 deep-venue leverage carry: funding_carry routing for the
      # fund_venues1_ prefix, per-interval funding accrual, delta-neutrality at
      # every leverage, borrow-on-shortfall + liquidation-on-gap mechanics
      # (margin seam byte-identical off), no-lookahead, sweep monotonicity,
      # venue-fair-window enforcement (K-036), zero-volume refusal, K-019
      # through liquidation, gate v3 semantics + committed-summary honesty
      # (all cells failed; never green) (offline)
      - name: FUND-VENUES1 deep-venue leverage carry evidence model
        run: python -m pytest -q tests/test_fund_venues1_evidence.py

      # DATA1 multi-venue data foundation: catalog gap honesty, per-venue
      # normalizers (incl. the OKX 1Dutc midnight-UTC guard), funding-interval
      # handling + FUND-EV1 daily aggregation, union alignment with explicit
      # holes (no fill/truncation), pagination, artifact sha256 round trip,
      # committed-summary reconciliation (offline; live smoke is env-gated off)
      - name: DATA1 multi-venue data foundation
        run: python -m pytest -q tests/test_data1_multi_venue.py

      # Lint (ruff) — scoped to CI-SAFE1 authored modules; pre-existing debt tracked in KNOWN_ISSUES
      - name: Lint (ruff — safety modules)
        run: |
          ruff check \
            scripts/check_trading_safety_text.py \
            scripts/check_secret_hygiene.py \
            tests/test_trading_safety_invariants.py \
            tests/test_trading_safety_text_guards.py \
            tests/test_secret_hygiene.py \
            tests/test_review_bundle_hygiene.py \
            tests/test_current_truth_consistency.py \
            tests/test_current_truth_registry.py
          ruff format --check \
            scripts/check_trading_safety_text.py \
            scripts/check_secret_hygiene.py \
            tests/test_trading_safety_invariants.py \
            tests/test_trading_safety_text_guards.py \
            tests/test_secret_hygiene.py \
            tests/test_review_bundle_hygiene.py \
            tests/test_current_truth_consistency.py \
            tests/test_current_truth_registry.py

  # ---------------------------------------------------------------------------
  # DASHBOARD-QA: Playwright browser-smoke suite for the Paper Trading dashboard.
  # Promoted to BLOCKING in CI-CLEAN1 after consistent Ubuntu greens on DASH-QA1.1.
  # Kept as a separate job because it needs `playwright install chromium`; the
  # browser pytest marker must NOT be folded into the main full-tests run.
  # ---------------------------------------------------------------------------
  dashboard-qa:
    name: Dashboard browser smoke (DASH-QA1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies (locked)
        run: |
          pip install -r requirements-dev.lock
          pip install -e . --no-deps

      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      - name: Run dashboard browser-smoke suite
        run: python -m pytest -m browser tests/dashboard_qa/ -q

  # ---------------------------------------------------------------------------
  # INFORMATIONAL — TYPECHECK: mypy strict, non-blocking. Address incrementally
  # toward green; promote to blocking only when the strict-mypy debt is clean.
  # Split from the full-tests job in CI-CLEAN1 so a mypy failure cannot hide the
  # full pytest suite's signal.
  # ---------------------------------------------------------------------------
  typecheck:
    name: Type check (mypy strict, informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies (locked)
        run: |
          pip install -r requirements-dev.lock
          pip install -e . --no-deps

      - name: Type check (mypy)
        run: mypy .

  # ---------------------------------------------------------------------------
  # INFORMATIONAL — FULL TESTS: the full pytest suite, non-blocking. Excludes
  # the `browser` marker (owned by dashboard-qa). Some test categories require
  # optional deps or infra; failures here are visible but do not block.
  # ---------------------------------------------------------------------------
  full-tests:
    name: Full pytest suite (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies (locked)
        run: |
          pip install -r requirements-dev.lock
          pip install -e . --no-deps

      - name: Full pytest suite (excludes browser marker)
        run: python -m pytest -q -m "not browser"
